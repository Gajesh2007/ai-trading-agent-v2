<svg width="100%" viewBox="0 0 700 870" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }

  .cg rect { fill: #F1EFE8; stroke: #B4B2A9; }
  .cg .th { fill: #444441; }
  .cg .ts { fill: #5F5E5A; }

  .ct rect { fill: #E1F5EE; stroke: #0F6E56; }
  .ct .th { fill: #085041; }
  .ct .ts { fill: #0F6E56; }

  .cb rect { fill: #E6F1FB; stroke: #185FA5; }
  .cb .th { fill: #0C447C; }
  .cb .ts { fill: #185FA5; }

  .ca rect { fill: #FAEEDA; stroke: #854F0B; }
  .ca .th { fill: #633806; }
  .ca .ts { fill: #854F0B; }

  .cp rect { fill: #EEEDFE; stroke: #534AB7; }
  .cp .th { fill: #3C3489; }
  .cp .ts { fill: #534AB7; }

  .cr rect { fill: #FDE8E8; stroke: #B91C1C; }
  .cr .th { fill: #7F1D1D; }
  .cr .ts { fill: #B91C1C; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- LAYER 0: Harness Core -->
<g class="cg">
<rect x="40" y="28" width="620" height="66" rx="12" stroke-width="0.5"/>
<text class="th" x="350" y="52" text-anchor="middle" dominant-baseline="central">Layer 0 · Harness Core</text>
<text class="ts" x="350" y="74" text-anchor="middle" dominant-baseline="central">State manager · Context bus (per-role) · Model router · Full prompt/response logging</text>
</g>

<!-- Arrow L0 → L1 -->
<line x1="350" y1="94" x2="350" y2="122" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 1: Information Agents -->
<g class="cg">
<rect x="40" y="127" width="620" height="206" rx="12" stroke-width="0.5"/>
<text class="th" x="350" y="150" text-anchor="middle" dominant-baseline="central">Layer 1 · Information Agents → Signal Cache</text>
</g>

<!-- 5 agent boxes -->
<g class="ct">
<rect x="56" y="168" width="108" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="185" text-anchor="middle" dominant-baseline="central">Macro</text>
<text class="ts" x="110" y="205" text-anchor="middle" dominant-baseline="central">Gemini 3.1</text>
</g>
<g class="ct">
<rect x="174" y="168" width="108" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="228" y="185" text-anchor="middle" dominant-baseline="central">Pred. Markets</text>
<text class="ts" x="228" y="205" text-anchor="middle" dominant-baseline="central">Gemini 3.1</text>
</g>
<g class="ct">
<rect x="292" y="168" width="108" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="346" y="185" text-anchor="middle" dominant-baseline="central">Fundamentals</text>
<text class="ts" x="346" y="205" text-anchor="middle" dominant-baseline="central">Opus 4.6</text>
</g>
<g class="ct">
<rect x="410" y="168" width="108" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="464" y="185" text-anchor="middle" dominant-baseline="central">Flow &amp; Pos.</text>
<text class="ts" x="464" y="205" text-anchor="middle" dominant-baseline="central">Gemini 3.1</text>
</g>
<g class="ct">
<rect x="528" y="168" width="108" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="582" y="185" text-anchor="middle" dominant-baseline="central">Technical</text>
<text class="ts" x="582" y="205" text-anchor="middle" dominant-baseline="central">Gemini 3.1</text>
</g>

<!-- Collector -->
<line x1="110" y1="220" x2="110" y2="238" stroke="#888780" stroke-width="0.5"/>
<line x1="228" y1="220" x2="228" y2="238" stroke="#888780" stroke-width="0.5"/>
<line x1="346" y1="220" x2="346" y2="238" stroke="#888780" stroke-width="0.5"/>
<line x1="464" y1="220" x2="464" y2="238" stroke="#888780" stroke-width="0.5"/>
<line x1="582" y1="220" x2="582" y2="238" stroke="#888780" stroke-width="0.5"/>
<line x1="110" y1="238" x2="582" y2="238" stroke="#888780" stroke-width="0.5"/>
<line x1="346" y1="238" x2="346" y2="262" class="arr" marker-end="url(#arrow)"/>

<!-- Context Package -->
<g class="cb">
<rect x="180" y="267" width="340" height="42" rx="8" stroke-width="0.5"/>
<text class="th" x="350" y="283" text-anchor="middle" dominant-baseline="central">Context Package (JSON)</text>
<text class="ts" x="350" y="299" text-anchor="middle" dominant-baseline="central">Cached signals + live prices + prediction events</text>
</g>

<!-- Arrow L1 → L2 -->
<line x1="350" y1="309" x2="350" y2="352" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 2: Synthesis & Decision -->
<g class="cg">
<rect x="40" y="357" width="620" height="260" rx="12" stroke-width="0.5"/>
<text class="th" x="350" y="380" text-anchor="middle" dominant-baseline="central">Layer 2 · Synthesis &amp; Decision</text>
</g>

<text class="ts" x="350" y="400" text-anchor="middle" dominant-baseline="central">Multi-model jury (parallel) · 100 tool-call steps · Web search + simulation</text>

<!-- 3 jury analyst boxes -->
<g class="ct">
<rect x="60" y="414" width="180" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="150" y="431" text-anchor="middle" dominant-baseline="central">Analyst A</text>
<text class="ts" x="150" y="451" text-anchor="middle" dominant-baseline="central">Opus 4.6 · max effort</text>
</g>
<g class="ct">
<rect x="260" y="414" width="180" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="350" y="431" text-anchor="middle" dominant-baseline="central">Analyst B</text>
<text class="ts" x="350" y="451" text-anchor="middle" dominant-baseline="central">GPT-5.4 · xHigh effort</text>
</g>
<g class="ct">
<rect x="460" y="414" width="180" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="431" text-anchor="middle" dominant-baseline="central">Analyst C</text>
<text class="ts" x="550" y="451" text-anchor="middle" dominant-baseline="central">Gemini 3.1 Pro</text>
</g>

<!-- Jury → Evaluator arrows -->
<line x1="150" y1="466" x2="280" y2="496" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="350" y1="466" x2="350" y2="496" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="466" x2="420" y2="496" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Size multiplier annotation -->
<text class="ts" x="60" y="490" dominant-baseline="central">Size: unanimous 1x · low-conv 0.6x · majority 0.5x</text>

<!-- Evaluator -->
<g class="ca">
<rect x="145" y="501" width="410" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="350" y="518" text-anchor="middle" dominant-baseline="central">Evaluator (skeptic · no-trade default)</text>
<text class="ts" x="350" y="538" text-anchor="middle" dominant-baseline="central">Opus 4.6 max · Approve / Send back → re-jury / Reject</text>
</g>

<!-- SEND_BACK loop arrow -->
<path d="M556 527 C580 527, 580 443, 460 443" fill="none" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="586" y="485" fill="#854F0B">Send back</text>

<!-- Evaluator → Trade Decision -->
<line x1="350" y1="553" x2="350" y2="572" class="arr" marker-end="url(#arrow)"/>

<!-- Trade Decision -->
<g class="cp">
<rect x="230" y="577" width="240" height="36" rx="8" stroke-width="0.5"/>
<text class="th" x="350" y="599" text-anchor="middle" dominant-baseline="central">Trade Decision → Execute</text>
</g>

<!-- Arrow L2 → L3 -->
<line x1="350" y1="613" x2="350" y2="642" class="arr" marker-end="url(#arrow)"/>

<!-- LAYER 3: Position Management -->
<g class="cg">
<rect x="40" y="647" width="620" height="145" rx="12" stroke-width="0.5"/>
<text class="th" x="350" y="670" text-anchor="middle" dominant-baseline="central">Layer 3 · Position Management</text>
</g>

<!-- Thesis Validator -->
<g class="ct">
<rect x="56" y="687" width="270" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="191" y="704" text-anchor="middle" dominant-baseline="central">Thesis Validator (every 5 min)</text>
<text class="ts" x="191" y="724" text-anchor="middle" dominant-baseline="central">Gemini 3.1 · crowding alerts</text>
</g>

<!-- Escalation arrow -->
<line x1="326" y1="713" x2="376" y2="713" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="351" y="705" text-anchor="middle">Escalate</text>

<!-- Exit Evaluator -->
<g class="ca">
<rect x="381" y="687" width="260" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="511" y="704" text-anchor="middle" dominant-baseline="central">Exit Evaluator</text>
<text class="ts" x="511" y="724" text-anchor="middle" dominant-baseline="central">Opus 4.6 max · edge-based exits</text>
</g>

<!-- Circuit breaker -->
<g class="cr">
<rect x="56" y="750" width="160" height="32" rx="8" stroke-width="0.5"/>
<text class="th" x="136" y="770" text-anchor="middle" dominant-baseline="central">Circuit breaker $50</text>
</g>

<!-- Subagent spawning -->
<g class="cp">
<rect x="236" y="750" width="180" height="32" rx="8" stroke-width="0.5"/>
<text class="th" x="326" y="770" text-anchor="middle" dominant-baseline="central">Subagent spawning</text>
</g>

<!-- Notifications -->
<g class="cb">
<rect x="436" y="750" width="205" height="32" rx="8" stroke-width="0.5"/>
<text class="th" x="538" y="770" text-anchor="middle" dominant-baseline="central">Telegram / Discord</text>
</g>

<!-- Feedback loop: L3 back to L1 -->
<path d="M660 713 L676 713 L676 238 L660 238" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="680" y="476" text-anchor="start" transform="rotate(90 680 476)">Re-fetch signals</text>

<!-- Legend -->
<circle cx="62" cy="855" r="5" fill="#5DCAA5"/>
<text class="ts" x="74" y="859">Analysis</text>
<circle cx="155" cy="855" r="5" fill="#EF9F27"/>
<text class="ts" x="167" y="859">Evaluation</text>
<circle cx="265" cy="855" r="5" fill="#7F77DD"/>
<text class="ts" x="277" y="859">Decision</text>
<circle cx="355" cy="855" r="5" fill="#85B7EB"/>
<text class="ts" x="367" y="859">Data</text>
<circle cx="425" cy="855" r="5" fill="#F87171"/>
<text class="ts" x="437" y="859">Safety</text>
</svg>
